<body>

        <div class="nav-container">
            <span class="logo">Recipe Atelier</span>
            <ul>
                <li><a href="index.html">Home</a></li>

                <li><a href="contact.html" class="active">Contact</a></li>

    <main class="contact-container">
        <h2> Join our story </h2>

        <section class="section-container">
            <div class="about">
                <p>
                    Here you can send your name and email as well <br>
                    as your own recipe to be featured on our website.<br>
                    Submited recipes will reviewed by our team before<br>
                    being displayed.
                </p>
            </div>
            <form class="contact-form" method="post" action="#">
                <input type="text" placeholder="Name">
                <input type="email" placeholder="Email">
                <textarea placeholder="Message"></textarea>
                <button type="submit">Send</button>

            </form>
        </section>
    </main>
